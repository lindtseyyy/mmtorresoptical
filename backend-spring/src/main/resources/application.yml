spring:
  application:
    name: OpticalClinicManagementSystem

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database: postgresql
    show-sql: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000

  database:
    backup:
      use-docker: false
      docker-container: postgres_db_mmtorres

server:
  port: 8080

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY}

hash:
  pepper: ${HASH_PEPPER}